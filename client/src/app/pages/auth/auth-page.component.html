<main class="app-shell">
  <section class="card">
    <h1>{{ title() }}</h1>
    <p class="subtitle">{{ strings.subtitle }}</p>

    <div class="tabs" role="tablist" aria-label="Authentication mode">
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="mode() === 'login'"
        [class.active]="mode() === 'login'"
        [disabled]="isSubmitting()"
        (click)="setMode('login')">
        {{ strings.loginTab }}
      </button>
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="mode() === 'register'"
        [class.active]="mode() === 'register'"
        [disabled]="isSubmitting()"
        (click)="setMode('register')">
        {{ strings.registerTab }}
      </button>
    </div>

    @if (mode() === 'login') {
      <form class="form" (ngSubmit)="login()">
        <label>
          {{ strings.usernameLabel }}
          <input
            name="loginUsername"
            type="text"
            autocomplete="username"
            [(ngModel)]="loginUsername"
            [disabled]="isSubmitting()" />
        </label>

        <label>
          {{ strings.passwordLabel }}
          <input
            name="loginPassword"
            type="password"
            autocomplete="current-password"
            [(ngModel)]="loginPassword"
            [disabled]="isSubmitting()" />
        </label>

        <button class="submit" type="submit" [disabled]="isSubmitting()">
          {{ submitLabel() }}
        </button>
      </form>
    } @else {
      <form class="form" (ngSubmit)="register()">
        <label>
          {{ strings.usernameLabel }}
          <input
            name="registerUsername"
            type="text"
            autocomplete="username"
            [(ngModel)]="registerUsername"
            [disabled]="isSubmitting()" />
        </label>

        <label>
          {{ strings.passwordLabel }}
          <input
            name="registerPassword"
            type="password"
            autocomplete="new-password"
            [(ngModel)]="registerPassword"
            [disabled]="isSubmitting()" />
        </label>

        <label>
          {{ strings.projectActionLabel }}
          <div class="project-actions">
            <button
              type="button"
              [class.active]="registerProjectAction === 'join'"
              [disabled]="isSubmitting()"
              (click)="setProjectAction('join')">
              {{ strings.joinProject }}
            </button>
            <button
              type="button"
              [class.active]="registerProjectAction === 'create'"
              [disabled]="isSubmitting()"
              (click)="setProjectAction('create')">
              {{ strings.createProject }}
            </button>
          </div>
        </label>

        <label>
          {{ strings.projectLabel }}
          <input
            name="registerProject"
            type="text"
            [(ngModel)]="registerProject"
            [disabled]="isSubmitting()" />
        </label>

        <button class="submit" type="submit" [disabled]="isSubmitting()">
          {{ submitLabel() }}
        </button>
      </form>
    }

    @if (message()) {
      <p class="feedback" [class.error]="isError()">{{ message() }}</p>
    }
  </section>
</main>
